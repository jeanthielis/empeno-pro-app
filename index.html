<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1 previne zoom automático do iOS em inputs com font < 16px -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />

    <!-- PWA Meta -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="QualityControl" />
    <meta name="application-name" content="QualityControl" />
    <meta name="description" content="Sistema de Gestão de Qualidade — Controlo de Empeno, Dimensional e Atrito" />

    <!-- Ícones Apple (iOS) -->
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/pwa-512x512.png" />

    <!-- Splash screens iOS — fundo azul durante carregamento -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      /* Splash screen enquanto o Vue carrega */
      body { background-color: #0f172a; margin: 0; }
      #app:empty::before {
        content: '';
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        background: #0f172a;
      }
    </style>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/pwa-icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />

    <title>QualityControl</title>

    <!-- Aplica tema ANTES do Vue montar — evita flash de tema errado -->
    <script>
      (function() {
        var saved = localStorage.getItem('qc-theme')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        var isDark = saved === 'dark' || (saved === null && prefersDark)
        if (isDark) document.documentElement.classList.add('dark')
      })()
    </script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
